{% extends 'base.html' %}

{% block content %}

{% if current_user.is_authenticated and current_user.role == 'employer' %}

<div class="col-md-6 mx-auto">
<h3>Post a Job</h3>
<form method="post" class="card p-3 shadow">
    <input class="form-control mb-2" name="title" placeholder="Job Title" required>
    <textarea class="form-control mb-2" name="description" placeholder="Description" required></textarea>
    <input class="form-control mb-2" name="salary" placeholder="Salary" required>
    <input class="form-control mb-2" name="location" placeholder="Location" required>
    <input class="form-control mb-2" name="company" placeholder="Company" required>
    <button class="btn btn-dark w-100">Post Job</button>
</form>
</div>

{% endif %}

{% endblock %}
